<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Diagram — Table List</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
}
.header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid #334155;
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #f8fafc;
    margin-bottom: 4px;
}
.header .subtitle {
    font-size: 14px;
    color: #94a3b8;
}
.stats {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
}
.stat {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
}
.stat strong { color: #38bdf8; font-size: 18px; margin-right: 6px; }

.controls {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    align-items: center;
    flex-wrap: wrap;
}
.search-box {
    background: #1e293b;
    border: 1px solid #475569;
    border-radius: 8px;
    padding: 8px 14px;
    color: #e2e8f0;
    font-size: 14px;
    width: 280px;
    outline: none;
}
.search-box:focus { border-color: #38bdf8; }
.search-box::placeholder { color: #64748b; }

.filter-btn {
    background: #1e293b;
    border: 1px solid #475569;
    border-radius: 8px;
    padding: 6px 14px;
    color: #cbd5e1;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
}
.filter-btn:hover { border-color: #38bdf8; color: #38bdf8; }
.filter-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 600; }

.nav-btn {
    background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
    border: none;
    border-radius: 8px;
    padding: 6px 16px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
}
.nav-btn:hover { opacity: 0.9; }

.content {
    padding: 24px 32px;
}

.category-section {
    margin-bottom: 32px;
}
.category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    cursor: pointer;
    user-select: none;
}
.category-header h2 {
    font-size: 18px;
    font-weight: 600;
}
.category-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
}
.category-count {
    font-size: 12px;
    background: #334155;
    padding: 2px 10px;
    border-radius: 12px;
    color: #94a3b8;
}
.toggle-icon {
    font-size: 12px;
    color: #64748b;
    margin-left: auto;
    transition: transform 0.2s;
}
.category-header.collapsed .toggle-icon { transform: rotate(-90deg); }

.tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    align-items: start;
}

.table-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
}
.table-card:hover {
    border-color: #475569;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transform: translateY(-1px);
}
.table-card.highlight {
    border-color: #38bdf8 !important;
    box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
}

.table-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
}
.table-name {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.3px;
}
.table-col-count {
    font-size: 11px;
    background: rgba(255,255,255,0.15);
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: auto;
    white-space: nowrap;
}
.table-fk-badge {
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 8px;
    white-space: nowrap;
}

.table-body {
    display: none;
}
.table-card.expanded .table-body {
    display: block;
}

.column-row {
    display: flex;
    align-items: center;
    padding: 4px 16px;
    font-size: 12px;
    border-top: 1px solid rgba(255,255,255,0.04);
    gap: 6px;
}
.column-row:hover { background: rgba(255,255,255,0.03); }

.col-icon {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    font-size: 10px;
}
.col-icon.pk { color: #f59e0b; }
.col-icon.fk { color: #38bdf8; }
.col-icon.normal { color: #475569; }

.col-name {
    font-weight: 500;
    color: #f1f5f9;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.col-name.pk-col { color: #fbbf24; }
.col-name.fk-col { color: #7dd3fc; }

.col-type {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    color: #fff;
    opacity: 0.8;
    white-space: nowrap;
    flex-shrink: 0;
}

.col-nullable {
    font-size: 9px;
    color: #64748b;
    flex-shrink: 0;
    width: 14px;
    text-align: center;
}

.fk-ref {
    font-size: 10px;
    color: #38bdf8;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
}
.fk-ref:hover { text-decoration: underline; }

.table-footer {
    padding: 6px 16px 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
}
.fk-list {
    font-size: 11px;
    color: #94a3b8;
}
.fk-item {
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 4px;
}
.fk-arrow { color: #38bdf8; }
.fk-target {
    color: #7dd3fc;
    cursor: pointer;
}
.fk-target:hover { text-decoration: underline; }

.rel-section {
    margin-top: 40px;
    border-top: 1px solid #334155;
    padding-top: 24px;
}
.rel-section h2 {
    font-size: 18px;
    margin-bottom: 16px;
}
.rel-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.rel-table th {
    text-align: left;
    padding: 8px 12px;
    background: #1e293b;
    border-bottom: 2px solid #334155;
    font-weight: 600;
    color: #94a3b8;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.rel-table td {
    padding: 6px 12px;
    border-bottom: 1px solid #1e293b;
}
.rel-table tr:hover td { background: rgba(56,189,248,0.05); }
.rel-from { color: #fbbf24; cursor: pointer; }
.rel-to { color: #7dd3fc; cursor: pointer; }
.rel-from:hover, .rel-to:hover { text-decoration: underline; }
.rel-col { color: #94a3b8; }
.rel-action { color: #64748b; font-size: 11px; }

.hidden { display: none !important; }

.no-data {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    flex-direction: column;
    gap: 16px;
    color: #64748b;
}
.no-data a {
    color: #38bdf8;
    text-decoration: none;
}
.no-data a:hover { text-decoration: underline; }

@media (max-width: 768px) {
    .tables-grid { grid-template-columns: 1fr; }
    .header, .content { padding: 16px; }
    .search-box { width: 100%; }
}

/* Toast notifications */
.toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
.toast { background: rgba(15, 23, 42, 0.95); color: #e2e8f0; padding: 12px 24px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 1px solid rgba(99,102,241,0.3); animation: toastIn 0.3s ease; pointer-events: auto; }
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.toast.fade-out { animation: toastOut 0.3s ease forwards; }
@keyframes toastOut { to { opacity: 0; transform: translateY(12px); } }

/* Export dropdown */
.export-wrapper { position: relative; display: inline-block; }
.export-btn { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.export-btn:hover { background: linear-gradient(135deg, #818cf8, #6366f1); }
.export-btn .arrow { font-size: 10px; transition: transform 0.2s; }
.export-wrapper.open .export-btn .arrow { transform: rotate(180deg); }
.export-menu { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: #1e293b; border: 1px solid #334155; border-radius: 10px; min-width: 220px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 1000; overflow: hidden; }
.export-wrapper.open .export-menu { display: block; }
.export-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 16px; background: none; border: none; color: #e2e8f0; font-size: 14px; cursor: pointer; text-align: left; }
.export-menu button:hover { background: #334155; }
.export-menu button .icon { width: 20px; text-align: center; font-size: 16px; }
.export-menu hr { border: none; border-top: 1px solid #334155; margin: 4px 0; }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div id="app"></div>

<script>
function showToast(msg, duration = 3000) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
        toast.classList.add('fade-out');
        toast.addEventListener('animationend', () => toast.remove());
    }, duration);
}

// --- Auto-categorization engine ---
function autoCategorize(schema) {
    const tableNames = Object.keys(schema);

    // ── Phase 1: Known pattern rules (highest priority) ──
    const rules = [
        { name: 'Identity & Auth', patterns: [/^aspnet/i, /^role/i, /^user(claim|login|role|token)/i, /identity/i, /auth/i, /permission/i, /claim/i] },
        { name: 'Hangfire (Job Queue)', patterns: [/^hangfire/i] },
        { name: 'Legacy Job Queue', patterns: [/^(job|jobparameter|jobqueue|jobstate|state|counter|aggregatedcounter|distributedlock|hash|list|server|set)$/i] },
        { name: 'System', patterns: [/^__ef/i, /^migration/i, /^schema_version/i, /^sysdiagram/i] },
        { name: 'Audit & Logs', patterns: [/audit/i, /^log/i, /log$/i, /history$/i, /changelog/i, /tracking/i] },
    ];

    const assigned = {};
    const unassigned = [];

    for (const t of tableNames) {
        let found = false;
        for (const rule of rules) {
            if (rule.patterns.some(p => p.test(t))) {
                assigned[t] = rule.name;
                found = true;
                break;
            }
        }
        if (!found) unassigned.push(t);
    }

    // ── Phase 2: Extract meaningful words from table names ──
    const genericPrefixes = new Set(['tbl','vw','sp','fn','usp','udf','dim','fact','tmp','temp','stg','raw','lu','lkp','ref','t','v','p','dbo']);

    // Split a table name into meaningful word tokens (lowercase), stripping generic prefixes
    function tokenize(name) {
        // First split on underscores
        let parts = name.split('_').filter(Boolean);
        // Strip leading generic prefixes
        let i = 0;
        while (i < parts.length - 1 && genericPrefixes.has(parts[i].toLowerCase())) i++;
        parts = parts.slice(i);
        // Then split each remaining part on camelCase/PascalCase boundaries
        const tokens = [];
        for (const part of parts) {
            const sub = part.replace(/([a-z])([A-Z])/g, '$1_$2').replace(/([A-Z]+)([A-Z][a-z])/g, '$1_$2').split('_');
            tokens.push(...sub);
        }
        return tokens.map(p => p.toLowerCase());
    }

    // Find the longest shared prefix (in words) between two token arrays
    function sharedPrefixLen(a, b) {
        let n = 0;
        for (let i = 0; i < Math.min(a.length, b.length); i++) {
            if (a[i] === b[i]) n++;
            else break;
        }
        return n;
    }

    // Tokenize all unassigned tables
    const tableTokens = {};
    for (const t of unassigned) {
        tableTokens[t] = tokenize(t);
    }

    // ── Phase 3: Multi-word prefix grouping ──
    // Build groups by finding the longest shared prefix between tables.
    // Start by grouping tables that share at least 1 meaningful prefix word.
    // Then try to merge groups that share longer prefixes.

    // For each pair of tables, compute shared prefix length
    // Use a union-find to merge tables with shared prefixes
    const parent = {};
    const groupPrefix = {}; // track the shared prefix words for each group root

    function find(x) {
        if (parent[x] !== x) parent[x] = find(parent[x]);
        return parent[x];
    }
    function union(a, b) {
        const ra = find(a), rb = find(b);
        if (ra !== rb) parent[ra] = rb;
    }

    for (const t of unassigned) parent[t] = t;

    // Group tables sharing at least 1 prefix word
    for (let i = 0; i < unassigned.length; i++) {
        for (let j = i + 1; j < unassigned.length; j++) {
            const a = unassigned[i], b = unassigned[j];
            const shared = sharedPrefixLen(tableTokens[a], tableTokens[b]);
            if (shared >= 1) {
                union(a, b);
            }
        }
    }

    // Collect groups and determine best category name for each
    const prefixGroupsMap = {};
    for (const t of unassigned) {
        const root = find(t);
        if (!prefixGroupsMap[root]) prefixGroupsMap[root] = [];
        prefixGroupsMap[root].push(t);
    }

    // For each group, find the longest common prefix among all members
    function groupCommonPrefix(tables) {
        if (tables.length === 0) return [];
        let common = tableTokens[tables[0]].slice();
        for (let i = 1; i < tables.length; i++) {
            const tokens = tableTokens[tables[i]];
            let n = 0;
            for (let j = 0; j < Math.min(common.length, tokens.length); j++) {
                if (common[j] === tokens[j]) n++;
                else break;
            }
            common = common.slice(0, n);
            if (common.length === 0) break;
        }
        return common;
    }

    // Build prefix-based categories (before FK refinement)
    const prefixCategories = {}; // catName → [tables]
    const tableToCat = {}; // table → catName (for prefix phase)

    for (const [, tables] of Object.entries(prefixGroupsMap)) {
        if (tables.length < 2) continue; // solo tables handled later
        const common = groupCommonPrefix(tables);
        const catName = common.length > 0
            ? common.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')
            : null;
        if (catName) {
            if (!prefixCategories[catName]) prefixCategories[catName] = [];
            prefixCategories[catName].push(...tables);
            for (const t of tables) tableToCat[t] = catName;
        }
    }

    // ── Phase 4: FK relationship refinement ──
    // Build a bidirectional FK adjacency map (table → set of related tables)
    const fkNeighbors = {};
    for (const t of tableNames) {
        if (!fkNeighbors[t]) fkNeighbors[t] = new Set();
        const def = schema[t];
        for (const fk of def.foreign_keys) {
            const ref = fk.ref_table;
            if (!fkNeighbors[ref]) fkNeighbors[ref] = new Set();
            fkNeighbors[t].add(ref);
            fkNeighbors[ref].add(t);
        }
    }

    // 4a: Merge small prefix groups that are FK-connected to larger groups
    // If a small group (< 3 tables) has FK connections to a larger group, absorb it
    const catSizes = {};
    for (const [cat, tables] of Object.entries(prefixCategories)) {
        catSizes[cat] = tables.length;
    }

    for (const [cat, tables] of Object.entries(prefixCategories)) {
        if (tables.length >= 3) continue; // only merge small groups
        // Count FK connections to each other category
        const connectionCount = {};
        for (const t of tables) {
            for (const neighbor of (fkNeighbors[t] || [])) {
                const neighborCat = tableToCat[neighbor] || assigned[neighbor];
                if (neighborCat && neighborCat !== cat) {
                    connectionCount[neighborCat] = (connectionCount[neighborCat] || 0) + 1;
                }
            }
        }
        // Find the most-connected category
        let bestCat = null, bestCount = 0;
        for (const [targetCat, count] of Object.entries(connectionCount)) {
            if (count > bestCount && (catSizes[targetCat] || 0) >= 3) {
                bestCat = targetCat;
                bestCount = count;
            }
        }
        if (bestCat && bestCount >= tables.length) {
            // Absorb into the larger group
            prefixCategories[bestCat].push(...tables);
            for (const t of tables) tableToCat[t] = bestCat;
            delete prefixCategories[cat];
        }
    }

    // 4b: Place solo unassigned tables into a category if they have FK connections
    const soloTables = unassigned.filter(t => !tableToCat[t]);
    const remainingSolo = [];

    for (const t of soloTables) {
        // Check FK neighbors — find the most common category among them
        const catVotes = {};
        for (const neighbor of (fkNeighbors[t] || [])) {
            const neighborCat = tableToCat[neighbor] || assigned[neighbor];
            if (neighborCat) {
                catVotes[neighborCat] = (catVotes[neighborCat] || 0) + 1;
            }
        }
        let bestCat = null, bestVotes = 0;
        for (const [cat, votes] of Object.entries(catVotes)) {
            if (votes > bestVotes) { bestCat = cat; bestVotes = votes; }
        }
        if (bestCat) {
            tableToCat[t] = bestCat;
            if (prefixCategories[bestCat]) prefixCategories[bestCat].push(t);
            else {
                // It's a known rule category — we'll add it in the final build
            }
        } else {
            remainingSolo.push(t);
        }
    }

    // 4c: Among remaining solos, try to form FK-connected clusters
    const soloVisited = new Set();
    for (const t of remainingSolo) {
        if (soloVisited.has(t)) continue;
        // BFS to find connected solo tables
        const cluster = [];
        const queue = [t];
        soloVisited.add(t);
        while (queue.length > 0) {
            const curr = queue.shift();
            cluster.push(curr);
            for (const neighbor of (fkNeighbors[curr] || [])) {
                if (!soloVisited.has(neighbor) && remainingSolo.includes(neighbor)) {
                    soloVisited.add(neighbor);
                    queue.push(neighbor);
                }
            }
        }
        if (cluster.length >= 2) {
            // Name the cluster after the table with the most FK connections in the cluster
            const hub = cluster.reduce((best, c) => {
                const conns = (fkNeighbors[c] || new Set()).size;
                return conns > (fkNeighbors[best] || new Set()).size ? c : best;
            });
            const hubTokens = tableTokens[hub] || tokenize(hub);
            const catName = hubTokens.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            const finalName = prefixCategories[catName] ? catName + ' (Related)' : catName;
            prefixCategories[finalName] = cluster;
            for (const c of cluster) tableToCat[c] = finalName;
        }
    }

    // ── Phase 5: Build final categories with colors ──
    const palette = [
        { bg: '#dbeafe', border: '#3b82f6', header: '#2563eb', headerText: '#fff' },
        { bg: '#dcfce7', border: '#22c55e', header: '#16a34a', headerText: '#fff' },
        { bg: '#fef3c7', border: '#f59e0b', header: '#d97706', headerText: '#fff' },
        { bg: '#fee2e2', border: '#ef4444', header: '#dc2626', headerText: '#fff' },
        { bg: '#e0e7ff', border: '#6366f1', header: '#4f46e5', headerText: '#fff' },
        { bg: '#fce7f3', border: '#ec4899', header: '#db2777', headerText: '#fff' },
        { bg: '#ccfbf1', border: '#14b8a6', header: '#0d9488', headerText: '#fff' },
        { bg: '#f3e8ff', border: '#a855f7', header: '#9333ea', headerText: '#fff' },
        { bg: '#fff7ed', border: '#f97316', header: '#ea580c', headerText: '#fff' },
        { bg: '#f1f5f9', border: '#94a3b8', header: '#64748b', headerText: '#fff' },
        { bg: '#ecfdf5', border: '#10b981', header: '#059669', headerText: '#fff' },
        { bg: '#fef2f2', border: '#f87171', header: '#ef4444', headerText: '#fff' },
        { bg: '#eff6ff', border: '#60a5fa', header: '#3b82f6', headerText: '#fff' },
        { bg: '#fdf4ff', border: '#c084fc', header: '#a855f7', headerText: '#fff' },
        { bg: '#f0fdfa', border: '#2dd4bf', header: '#14b8a6', headerText: '#fff' },
    ];

    const fixedColors = {
        'Identity & Auth': { bg: '#fce7f3', border: '#ec4899', header: '#db2777', headerText: '#fff' },
        'Hangfire (Job Queue)': { bg: '#fff7ed', border: '#f97316', header: '#ea580c', headerText: '#fff' },
        'Legacy Job Queue': { bg: '#f1f5f9', border: '#94a3b8', header: '#64748b', headerText: '#fff' },
        'System': { bg: '#f5f5f5', border: '#a3a3a3', header: '#737373', headerText: '#fff' },
        'Audit & Logs': { bg: '#f3e8ff', border: '#a855f7', header: '#9333ea', headerText: '#fff' },
    };

    const categories = {};
    const categoryColors = {};

    // Add known rule-based categories first
    for (const rule of rules) {
        const tables = tableNames.filter(t => assigned[t] === rule.name);
        // Also include any FK-placed tables into rule categories
        const fkPlaced = unassigned.filter(t => tableToCat[t] === rule.name);
        const all = [...new Set([...tables, ...fkPlaced])];
        if (all.length > 0) {
            categories[rule.name] = all;
            categoryColors[rule.name] = fixedColors[rule.name] || palette[Object.keys(categories).length % palette.length];
        }
    }

    // Add auto-detected prefix/FK categories, sorted by size (largest first)
    const sortedCats = Object.entries(prefixCategories).sort((a, b) => b[1].length - a[1].length);
    for (const [catName, tables] of sortedCats) {
        // Deduplicate
        const unique = [...new Set(tables)];
        if (unique.length > 0) {
            categories[catName] = unique;
            categoryColors[catName] = palette[Object.keys(categories).length % palette.length];
        }
    }

    // Remaining unplaced tables go into "Other"
    const finalSolo = tableNames.filter(t => !assigned[t] && !tableToCat[t]);
    if (finalSolo.length > 0) {
        categories['Other'] = finalSolo;
        categoryColors['Other'] = { bg: '#f5f5f5', border: '#a3a3a3', header: '#737373', headerText: '#fff' };
    }

    // Build table-to-category map
    const tableCategory = {};
    for (const [cat, tables] of Object.entries(categories)) {
        for (const t of tables) tableCategory[t] = cat;
    }
    // Safety net: any table still missing gets "Other"
    for (const t of tableNames) {
        if (!tableCategory[t]) {
            tableCategory[t] = 'Other';
            if (!categories['Other']) { categories['Other'] = []; categoryColors['Other'] = { bg: '#f5f5f5', border: '#a3a3a3', header: '#737373', headerText: '#fff' }; }
            categories['Other'].push(t);
        }
    }

    return { categories, categoryColors, tableCategory };
}

// --- Type badge color ---
function typeColor(type) {
    const t = type.toLowerCase();
    if (t.includes('int')) return '#3b82f6';
    if (t.includes('varchar') || t.includes('char') || t.includes('text') || t.includes('longtext')) return '#22c55e';
    if (t.includes('datetime') || t.includes('date') || t.includes('time')) return '#f59e0b';
    if (t.includes('tinyint') || t.includes('bit') || t.includes('bool')) return '#ec4899';
    if (t.includes('decimal') || t.includes('float') || t.includes('double')) return '#8b5cf6';
    return '#64748b';
}

// --- Escape HTML ---
function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

            const tableName = card.dataset.table;
            const cols = Array.from(card.querySelectorAll('.col-name')).map(c => c.textContent.toLowerCase());
            const match = tableName.toLowerCase().includes(q) || cols.some(c => c.includes(q));

            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('hidden'));

            if (allBtn) allBtn.classList.add('active');
        }
    });
}

// --- Global functions ---
function toggleTable(card) {
    card.classList.toggle('expanded');
}

function toggleCategory(header) {
    header.classList.toggle('collapsed');
    const grid = header.nextElementSibling;
    grid.classList.toggle('hidden');
}

function expandAll() {
    document.querySelectorAll('.table-card').forEach(c => c.classList.add('expanded'));
}
function collapseAll() {
    document.querySelectorAll('.table-card').forEach(c => c.classList.remove('expanded'));
}

function scrollToTable(name) {
    const el = document.getElementById('table-' + name);
    if (el) {
        el.classList.add('expanded', 'highlight');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const section = el.closest('.category-section');
        if (section) {
            const grid = section.querySelector('.tables-grid');
            const header = section.querySelector('.category-header');
            grid.classList.remove('hidden');
            header.classList.remove('collapsed');
        }
        setTimeout(() => el.classList.remove('highlight'), 3000);
    }
}

function filterCategory(cat, btn) {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.category-section').forEach(s => {
        if (cat === 'all' || s.dataset.category === cat) {
            s.classList.remove('hidden');
        } else {
            s.classList.add('hidden');
        }
    });
}

async function shareLink() {
    const raw = sessionStorage.getItem('dbdiagram_data');
    if (!raw) { showToast('No schema data loaded'); return; }

    try {
        let encoded;
        if (typeof CompressionStream !== 'undefined') {
            const blob = new Blob([raw]);
            const cs = new CompressionStream('gzip');
            const compressedStream = blob.stream().pipeThrough(cs);
            const compressedBlob = await new Response(compressedStream).blob();
            const buffer = await compressedBlob.arrayBuffer();
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            encoded = 'gz:' + btoa(binary);
        } else {
            encoded = 'raw:' + btoa(unescape(encodeURIComponent(raw)));
        }

        if (encoded.length > 100000) {
            showToast('Schema too large for URL sharing — use HTML export instead', 5000);
            return;
        }

        const url = window.location.origin + '/#data=' + encodeURIComponent(encoded);
        await navigator.clipboard.writeText(url);
        showToast('Share link copied to clipboard!');
    } catch (err) {
        showToast('Failed to generate share link: ' + err.message);
    }
}

    html += '.cover { text-align: center; padding: 80px 0 40px; }';
    html += '.cover h1 { font-size: 28px; }';
    html += '.cover .meta { color: #64748b; font-size: 13px; margin-top: 12px; }';
    html += '.toc { column-count: 2; column-gap: 24px; }';
    html += '.toc-cat { font-weight: 600; margin: 8px 0 2px; color: #334155; }';
    html += '.toc-item { margin-left: 12px; color: #475569; }';
    html += '.cat-heading { break-before: page; }';
    html += '.table-section { break-inside: avoid; margin-bottom: 16px; }';
    html += '.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 600; }';
    html += '.pk { background: #dbeafe; color: #1e40af; }';
    html += '.fk { background: #fef3c7; color: #92400e; }';
    html += '.rel-table td { font-size: 9px; }';
    html += '.footer { text-align: center; color: #94a3b8; font-size: 9px; margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 8px; }';
    html += '</style></head><body>';

    // Cover
    html += '<div class="cover">';
    html += '<h1>' + esc(dbName) + '</h1>';
    html += '<div class="meta">';
    if (version) html += 'Version: ' + esc(version) + ' &middot; ';
    html += tableCount + ' tables &middot; Generated ' + date;
    html += '</div></div>';

    // Table of Contents
    html += '<h2>Table of Contents</h2>';
    html += '<div class="toc">';
    for (const [cat, tables] of Object.entries(categories)) {
        html += '<div class="toc-cat">' + esc(cat) + ' (' + tables.length + ')</div>';
        for (const t of tables) {
            html += '<div class="toc-item">' + esc(t) + '</div>';
        }
    }
    html += '</div>';

    // Table details per category
    for (const [cat, tables] of Object.entries(categories)) {
        html += '<div class="cat-heading"><h2>' + esc(cat) + '</h2></div>';
        for (const t of tables) {
            const tbl = schema[t];
            if (!tbl) continue;
            html += '<div class="table-section">';
            html += '<h3>' + esc(t) + '</h3>';
            html += '<table><thead><tr><th>Column</th><th>Type</th><th>Nullable</th><th>Key</th></tr></thead><tbody>';
            for (const col of tbl.columns) {
                const isPK = tbl.primary_keys.includes(col.name);
                const isFK = tbl.foreign_keys.some(fk => fk.columns.includes(col.name));
                let keyBadge = '';
                if (isPK) keyBadge = '<span class="badge pk">PK</span>';
                if (isFK) keyBadge += (keyBadge ? ' ' : '') + '<span class="badge fk">FK</span>';
                html += '<tr>';
                html += '<td class="mono">' + esc(col.name) + '</td>';
                html += '<td>' + esc(col.type) + '</td>';
                html += '<td>' + (col.nullable ? 'YES' : 'NO') + '</td>';
                html += '<td>' + keyBadge + '</td>';
                html += '</tr>';
            }
            html += '</tbody></table>';
            if (tbl.keys && tbl.keys.length > 0) {
                html += '<div style="margin-top:4px;font-size:10px;"><strong>Indexes:</strong> ';
                html += tbl.keys.map(function(k) {
                    return esc(k.name) + ' (' + esc(k.columns.join(', ')) + ')' + (k.unique ? ' UNIQUE' : '');
                }).join('; ');
                html += '</div>';
            }
            if (tbl.foreign_keys && tbl.foreign_keys.length > 0) {
                html += '<div style="margin-top:4px;font-size:10px;"><strong>Foreign Keys:</strong> ';
                html += tbl.foreign_keys.map(function(fk) {
                    let s = esc(fk.columns.join(', ')) + ' &rarr; ' + esc(fk.ref_table) + '.' + esc(fk.ref_columns.join(', '));
                    if (fk.actions) s += ' (' + esc(fk.actions) + ')';
                    return s;
                }).join('; ');
                html += '</div>';
            }
            html += '</div>';
        }
    }

    // Relationship summary
    const allFKs = [];
    for (const [tName, tbl] of Object.entries(schema)) {
        for (const fk of tbl.foreign_keys) {
            allFKs.push({ from: tName, cols: fk.columns.join(', '), to: fk.ref_table, refCols: fk.ref_columns.join(', ') });
        }
    }
    if (allFKs.length > 0) {
        html += '<div class="cat-heading"><h2>Relationship Summary</h2></div>';
        html += '<table class="rel-table"><thead><tr><th>From Table</th><th>Column(s)</th><th>To Table</th><th>Referenced Column(s)</th></tr></thead><tbody>';
        for (const r of allFKs) {
            html += '<tr><td class="mono">' + esc(r.from) + '</td><td class="mono">' + esc(r.cols) + '</td><td class="mono">' + esc(r.to) + '</td><td class="mono">' + esc(r.refCols) + '</td></tr>';
        }
        html += '</tbody></table>';
    }

    // Footer
    html += '<div class="footer">Generated by DatabaseDiagram on ' + date + '</div>';
    html += '<script>window.onload=function(){window.print()}<\/script>';
    html += '</body></html>';

    const w = window.open('', '_blank');
    if (w) { w.document.write(html); w.document.close(); }
    else { showToast('Popup blocked — please allow popups for PDF export'); }
}
function downloadMarkdown() {
    const raw = sessionStorage.getItem('dbdiagram_data');
    if (!raw) { showToast('No schema data loaded'); return; }
    const data = JSON.parse(raw);
    const schema = data.schema;
    const dbName = data.database || 'Database';
    const version = data.version || '';
    const tableCount = Object.keys(schema).length;
    const date = new Date().toISOString().split('T')[0];

    const { categories, tableCategory } = autoCategorize(schema);

    let md = `# Database Schema: ${dbName}\n`;
    md += `> Generated on ${date} | ${tableCount} tables | ${version}\n\n`;

    md += `## Table of Contents\n`;
    for (const [cat, tables] of Object.entries(categories)) {
        md += `- **${cat}**\n`;
        for (const t of tables) md += `  - [${t}](#${t.toLowerCase().replace(/[^a-z0-9]+/g, '-')})\n`;
    }
    md += `\n---\n\n`;

    for (const [cat, tables] of Object.entries(categories)) {
        md += `## ${cat}\n\n`;
        for (const t of tables) {
            const tbl = schema[t];
            if (!tbl) continue;
            md += `### ${t}\n\n`;
            md += `| Column | Type | Nullable | Key |\n`;
            md += `|--------|------|----------|-----|\n`;
            for (const col of tbl.columns) {
                const isPK = tbl.primary_keys.includes(col.name);
                const isFK = tbl.foreign_keys.some(fk => fk.columns.includes(col.name));
                const key = isPK ? 'PK' : isFK ? 'FK' : '';
                md += `| ${col.name} | ${col.type} | ${col.nullable ? 'YES' : 'NO'} | ${key} |\n`;
            }
            md += `\n`;
            if (tbl.keys.length > 0) {
                md += `**Indexes:**\n`;
                for (const k of tbl.keys) {
                    md += `- ${k.name} (${k.columns.join(', ')})${k.unique ? ' UNIQUE' : ''}\n`;
                }
                md += `\n`;
            }
            if (tbl.foreign_keys.length > 0) {
                md += `**Foreign Keys:**\n`;
                for (const fk of tbl.foreign_keys) {
                    md += `- \`${fk.columns.join(', ')}\` → \`${fk.ref_table}.${fk.ref_columns.join(', ')}\``;
                    if (fk.actions) md += ` (${fk.actions})`;
                    md += `\n`;
                }
                md += `\n`;
            }
            md += `---\n\n`;
        }
    }

    md += generateAnalysisSummaryMd(schema);

    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `schema-${dbName.replace(/[^a-zA-Z0-9]/g, '_')}-${date}.md`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Markdown downloaded!');
}

function generateAnalysisSummaryMd(schema) {
    let errors = 0, warnings = 0;
    for (const [name, tbl] of Object.entries(schema)) {
        if (tbl.primary_keys.length === 0) errors++;
        for (const fk of tbl.foreign_keys) {
            if (!schema[fk.ref_table] && !schema[fk.ref_table?.toLowerCase()]) errors++;
        }
        if (tbl.columns.length > 30) warnings++;
        const hasFKIn = Object.values(schema).some(t => t.foreign_keys.some(f => f.ref_table === name || f.ref_table === name.toLowerCase()));
        const hasFKOut = tbl.foreign_keys.length > 0;
        if (!hasFKIn && !hasFKOut) warnings++;
    }
    const score = Math.max(0, 100 - errors * 15 - warnings * 5);
    let grade = 'F';
    if (score >= 90) grade = 'A';
    else if (score >= 75) grade = 'B';
    else if (score >= 60) grade = 'C';
    else if (score >= 40) grade = 'D';

    let md = `## Schema Analysis Summary\n\n`;
    md += `**Grade: ${grade}** (Score: ${score}/100)\n\n`;
    md += `- ${errors} error(s) found\n`;
    md += `- ${warnings} warning(s) found\n`;
    return md;
}
